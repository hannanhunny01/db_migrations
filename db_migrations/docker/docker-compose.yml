services:
  postgres:
    container_name: pgmigbench_postgres
    image: ${PGMIGBENCH_PG_IMAGE:-postgres:16.3}
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "${PGMIGBENCH_DB_PORT:-55432}:5432"
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c log_lock_waits=on
      -c track_activity_query_size=2048
      -c deadlock_timeout=200ms
      -c log_min_duration_statement=50
      -c log_line_prefix='%m [%p] %u@%d '
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 3s
      retries: 60
    volumes:
      - pgmigbench_pgdata:/var/lib/postgresql/data

volumes:
  pgmigbench_pgdata:
